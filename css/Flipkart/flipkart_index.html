<!DOCTYPE html>
<html>
<head>
<title>Flipkart Login</title>
<style>
body{
    background-color:lightgray;
    font-family:Arial;
}
.main{
    width:900px;
    height:550px;
    background-color:white;
    margin:30px auto;
}
.login{
    width:350px;
    height:550px;
    background-color:#2874f0;
    color:white;
    display:inline-block;
    vertical-align:top;
}
.form{
    width:540px;
    height:550px;
    display:inline-block;
    vertical-align:top;
}
h1{
    margin:50px 0 0 30px;
}
.info{
    margin:20px 0 0 30px;
    color:#dbdbdb;
    font-size:18px;
}
img{
    width:220px;
    margin:180px 0 0 65px;
}
input{
    width:400px;
    margin:70px 0 0 40px;
    border:none;
    border-bottom:1px solid #2874f0;
    outline:none;
}
.terms{
    margin:40px 0 0 40px;
    color:gray;
    font-size:12px;
}
.link{
    color:#2874f0;
    text-decoration:none;
}
.otp{
    width:400px;
    height:45px;
    margin:20px 0 0 40px;
    background-color:#fb641b;
    color:white;
    border:none;
}
.account{
    margin:280px 0 0 0;
    text-align:center;
}
.account a{
    color:#2874f0;
    text-decoration:none;
}
</style>
</head>
<body>
<div class="main">
    <div class="login">
        <h1>Login</h1>
        <p class="info">
            Get access to your Orders,<br>
            Wishlist and Recommendations
        </p>
        <img src="https://static-assets-web.flixcart.com/www/linchpin/fk-cp-zion/img/login_img_c4a81e.png">
    </div>

    <div class="form">
        <input type="text" placeholder="Enter Email/Mobile Number">
        <p class="terms">
            By continuing, you agree to Flipkart's
            <a href="#" class="link">Terms of Use</a>
            and
            <a href="#" class="link">Privacy Policy</a>.
        </p>
        <button class="otp">Request OTP</button>
        <p class="account">
            <a href="task1_signup.html">New to Flipkart? Create an account</a>
        </p>
    </div>
</div>
</body>
</html>
