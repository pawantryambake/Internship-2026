<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>
<style>
body{
    margin:0;
    background:#aee3f8;
    font-family:Arial,sans-serif;
}
.card{
    width:850px;
    height:450px;
    background:#d9edf7;
    margin:60px auto;
    border-radius:25px;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}
.corner{
    width:220px;
    height:220px;
    background:#6d8fe8;
    border-radius:0 25px 0 220px;
    position:absolute;
    top:0;
    right:0;
}
.photo{
    width:150px;
    height:150px;
    border-radius:50%;
    border:6px solid white;
    position:absolute;
    top:60px;
    left:50px;
    object-fit:cover;
}
.content{
    position:absolute;
    top:55px;
    left:240px;
    width:430px;
}
h1{
    margin:0;
    font-size:34px;
    color:#111;
}
.username{
    margin-top:8px;
    color:#777;
    font-size:18px;
}
.about{
    margin-top:20px;
    font-size:18px;
    line-height:28px;
    color:#333;
    width:450px;
}
.stats{
    margin-top:35px;
}
.stat{
    display:inline-block;
    margin-right:60px;
}
.number{
    font-size:28px;
    font-weight:bold;
    color:#111;
}
.label{
    color:#444;
    margin-top:5px;
}
.follow{
    width:170px;
    height:48px;
    margin-top:35px;
    background:black;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}
.profile{
    width:170px;
    height:48px;
    margin-top:35px;
    margin-left:10px;
    background:white;
    color:black;
    border:2px solid black;
    border-radius:10px;
    font-size:16px;
}
</style>
</head>
<body>
<div class="card">
    <div class="corner"></div>
    <img src="pawan.jpg" class="photo">
    <div class="content">
        <h1>Itz Pawan</h1>
        <div class="username">@itzpawan</div>
        <div class="about">
            I'm a Front-End Developer and DevOps learner,
            follow me to be the first who sees my new work.
        </div>
        <div class="stats">
            <div class="stat">
                <div class="number">15K</div>
                <div class="label">Views</div>
            </div>
            <div class="stat">
                <div class="number">82</div>
                <div class="label">Projects</div>
            </div>
            <div class="stat">
                <div class="number">1.3M</div>
                <div class="label">Followers</div>
            </div>
        </div>
        <button class="follow">Follow</button>
        <button class="profile">View Profile</button>
    </div>
</div>
</body>
</html>
