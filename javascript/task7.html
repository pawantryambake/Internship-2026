<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Password Checker</h1>
    <script>
        var pass = prompt('Enter Password to Enroll : ')
        
        if (pass.length>=8) {
            if (/[0-9]/.test(pass))
            {
              if (/[A-Z]/.test(pass)) 
              {
                if(/[!@#$%&*^]/.test(pass))
                {
                    console.log("Password Added Successfully");
                } else {
                    console.log("Password should contain atleast 1 Special Symbol");
                }
              } else {
                console.log("Password should contain atleast 1 Uppercase Letter");
              }
            } else {
                console.log("Password should contain atleast 1 Number");
            } 
        } else {
            console.log("Password should be atleast 8 characters long");
        }
    </script>
</body>
</html>
