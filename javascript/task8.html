      <!DOCTYPE html>
      <html lang="en">
      <head>
         <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Document</title>
      </head>
      <body>
         <script>

         var bill = Number(prompt("Enter your total Bill : "));
       
      if (bill>5000) {
         var dis20 = bill*.2;
         document.write("You got 20% Discount ",dis20 + "rs");
      }
      else if (bill>3000) {
         var dis10 = bill*.1;
         document.write("You got 20% Discount ",dis10 + "rs");
      }
       else if (bill>1000) {
         var dis05 = bill*.05;
         document.write("You got 20% Discount ",dis05 + "rs");
      }
      else {
         document.write("You got no Discount");
      }
        
        </script>
      </body>
      </html>
