<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promise Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f5f5f5;
    }

    .box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 420px;
    }

    button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 6px;
      background: #007acc;
      color: white;
      cursor: pointer;
    }

    p {
      margin: 1rem 0;
    }

    .result {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <button id="btn">Order Food</button>
    <p class="result" id="resultText">Click the button to order food.</p>
  </div>
  <script>
    const btn = document.getElementById('btn');
    const resultText = document.getElementById('resultText');

    function orderFood() {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          const success = Math.random() > 0.3;
          if (success) {
            resolve('Pizza delivered!');
          } else {
            reject('Pizza not delivered.');
          }
        }, 2000);
      });
    }

    btn.onclick = () => {
      resultText.textContent = 'Ordering...';
      orderFood()
        .then((message) => {
          resultText.textContent = message;
        })
        .catch((error) => {
          resultText.textContent = error;
        });
    };
  </script>
</body>
</html>
